map $http_x_forwarded_proto $otasign_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

log_format otasign '$remote_addr - $remote_user [$time_local] "$request_method $uri $server_protocol" '
                   '$status $body_bytes_sent "$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

server {
  listen 80;
  server_name _;
  access_log /var/log/nginx/access.log otasign;

  root /usr/share/nginx/html;
  index index.html;

  resolver 127.0.0.11 valid=30s ipv6=off;
  set $otasign_backend http://otasign-backend:8080;

  location ~ /\.(?!well-known/) {
    return 404;
  }

  location ~* ^/(env|server|server-status|console|info\.php|config\.json|settings\.js|trace\.axd|actuator|telescope|debug|ecp|v2|___proxy_subdomain_|@vite|js/env\.js|js/config\.js|config/|app/) {
    return 404;
  }

  location = /config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass $otasign_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $otasign_forwarded_proto;
  }

  location = /api {
    proxy_pass $otasign_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $otasign_forwarded_proto;
  }

  location = /launch {
    proxy_pass $otasign_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $otasign_forwarded_proto;
  }

  location /webhooks/ {
    proxy_pass $otasign_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $otasign_forwarded_proto;
  }

  location = /healthz {
    proxy_pass $otasign_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $otasign_forwarded_proto;
  }

  location = /readyz {
    proxy_pass $otasign_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $otasign_forwarded_proto;
  }

  location = /healthz/full {
    proxy_pass $otasign_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $otasign_forwarded_proto;
  }

  location = / {
    try_files /index.html =404;
  }

  location = /dashboard {
    try_files /index.html =404;
  }

  location / {
    try_files $uri =404;
  }
}
