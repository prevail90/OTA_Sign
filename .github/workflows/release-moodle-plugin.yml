name: Release Moodle Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-moodle-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Verify plugin metadata
        run: |
          grep -q "\$plugin->component = 'local_otasignconnector';" moodle/local_otasignconnector/version.php

      - name: PHP syntax check
        run: find moodle/local_otasignconnector -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Package plugin
        run: |
          mkdir -p dist/moodle-plugin/otasignconnector
          cp -R moodle/local_otasignconnector/. dist/moodle-plugin/otasignconnector/
          cd dist/moodle-plugin
          zip -r "../otasignconnector-${GITHUB_REF_NAME}.zip" otasignconnector -x '*/.DS_Store'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: otasignconnector-${{ github.ref_name }}
          path: dist/otasignconnector-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Attach plugin zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: OTA Sign Connector ${{ github.ref_name }}
          files: dist/otasignconnector-${{ github.ref_name }}.zip
          generate_release_notes: true
