services:
  otasign-backend:
    image: ghcr.io/prevail90/otasign-backend:${OTASIGN_IMAGE_TAG:-latest}
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      FRONTEND_URL: ${OTASIGN_FRONTEND_URL:?set OTASIGN_FRONTEND_URL}
      MOODLE_LOGIN_URL: ${MOODLE_LOGIN_URL:?set MOODLE_LOGIN_URL}
      MOODLE_OTA_SIGN_LAUNCH_URL: ${MOODLE_OTA_SIGN_LAUNCH_URL:?set MOODLE_OTA_SIGN_LAUNCH_URL}
      MOODLE_LAUNCH_SIGNING_SECRET: ${MOODLE_LAUNCH_SIGNING_SECRET:?set MOODLE_LAUNCH_SIGNING_SECRET}
      SESSION_COOKIE_NAME: otasign_session
      SESSION_COOKIE_SECURE: "true"
      ENFORCE_HTTPS: "true"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DATABASE_MIGRATIONS_PATH: db/migrations
      DOCUSEAL_URL: ${DOCUSEAL_URL:?set DOCUSEAL_URL}
      DOCUSEAL_PUBLIC_URL: ${DOCUSEAL_PUBLIC_URL:?set DOCUSEAL_PUBLIC_URL}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:?set DOCUSEAL_API_KEY}
      DOCUSEAL_WEBHOOK_SECRET: ${DOCUSEAL_WEBHOOK_SECRET:?set DOCUSEAL_WEBHOOK_SECRET}
      DOCUSEAL_WEBHOOK_MAX_AGE_SECONDS: "300"
      NOTIFICATION_WEBHOOK_URL: ${NOTIFICATION_WEBHOOK_URL:-}
      NOTIFICATION_WEBHOOK_SECRET: ${NOTIFICATION_WEBHOOK_SECRET:-}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --header='X-Forwarded-Proto: https' -qO- http://localhost:8080/readyz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  otasign-frontend:
    image: ghcr.io/prevail90/otasign-frontend:${OTASIGN_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=16m
    environment:
      # Browser-facing API base. Frontend nginx proxies /api, /launch, /webhooks, /healthz, and /readyz to otasign-backend.
      OTASIGN_API_BASE_URL: ${OTASIGN_FRONTEND_URL:?set OTASIGN_FRONTEND_URL}
      OTASIGN_MOODLE_LOGIN_URL: ${MOODLE_LOGIN_URL:?set MOODLE_LOGIN_URL}
      OTASIGN_MOODLE_LAUNCH_URL: ${MOODLE_OTA_SIGN_LAUNCH_URL:?set MOODLE_OTA_SIGN_LAUNCH_URL}
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  proxy:
    external: true
